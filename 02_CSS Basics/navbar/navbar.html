<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Navbar Clone</title>
    <link rel="stylesheet" href="navbar.css">
</head>
<body>

<nav class="navbar">

    <!-- Logo -->
    <div class="nav-logo">amazon</div>

    <!-- Location -->
    <div class="nav-location">
        <p class="small-text">Deliver to</p>
        <p class="bold-text">India</p>
    </div>

    <!-- Search Bar -->
    <div class="nav-search">
        <select>
            <option>All</option>
        </select>
        <input type="text" placeholder="Search Amazon">
        <button>🔍</button>
    </div>

    <!-- Account -->
    <div class="nav-account">
        <p class="small-text">Hello, Sign in</p>
        <p class="bold-text">Account & Lists</p>
    </div>

    <!-- Orders -->
    <div class="nav-orders">
        <p class="small-text">Returns</p>
        <p class="bold-text">& Orders</p>
    </div>

    <!-- Cart -->
    <div class="nav-cart">
        🛒 Cart
    </div>

</nav>

</body>
</html>
